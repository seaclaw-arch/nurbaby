<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nurbaby - Aplikasi Parenting</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍼 Nurbaby</h1>
            <p>Aplikasi Parenting untuk Orang Tua Cerdas</p>
        </header>

        <main>
            <div id="auth-section" class="card">
                <h2>Login / Sign Up</h2>
                <form id="auth-form">
                    <input type="email" id="email" placeholder="Email" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit" id="auth-btn">Login</button>
                </form>
                <p id="auth-message"></p>
            </div>

            <div id="app-section" style="display: none;">
                <div class="card">
                    <h2>Selamat Datang, <span id="user-name"></span>!</h2>
                    <button id="logout-btn" class="btn-logout">Logout</button>
                </div>

                <div class="card">
                    <h2>Data Anak-Anak</h2>
                    <div id="children-list"></div>
                    <button id="add-child-btn">+ Tambah Anak</button>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Nurbaby. Aplikasi Parenting Terpercaya.</p>
        </footer>
    </div>

    <script type="module" src="/app.js"></script>
</body>
</html>
